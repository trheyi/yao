# Cloud service region presets.
# Embedded at compile time via go:embed in cloud.go.

regions:
  - key: us
    label:
      zh-CN: "美国"
      en-US: "United States"
    api_url: "https://api-us.yao.run"
    default: true

  - key: cn
    label:
      zh-CN: "中国"
      en-US: "China"
    api_url: "https://api.yaoagents.cn"

  - key: ap
    label:
      zh-CN: "亚太"
      en-US: "Asia Pacific"
    api_url: "https://api-ap.yao.run"

  - key: eu
    label:
      zh-CN: "欧洲"
      en-US: "Europe"
    api_url: "https://api-eu.yao.run"
